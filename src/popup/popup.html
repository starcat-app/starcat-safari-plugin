<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Starcat Safari Plugin</title>
    <link rel="icon" type="image/png" href="../assets/icons/icon-32.png">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <h1>Starcat Safari Plugin</h1>
        <p>Connect to the Starcat local plugin service.</p>
      </header>

      <form id="popup-form" class="form">
        <label class="field">
          <span>Service URL</span>
          <input id="service-url" name="serviceURL" autocomplete="off" spellcheck="false" placeholder="http://127.0.0.1:5001">
        </label>

        <label class="field">
          <span>Local API Key</span>
          <input id="token" name="token" type="password" autocomplete="off" spellcheck="false">
        </label>

        <div class="actions">
          <button id="save" type="submit" class="primary">Save</button>
          <button id="test" type="button">Test</button>
        </div>

        <p id="status" class="status" role="status" aria-live="polite"></p>

        <button id="open-options" type="button" class="link-button">Open full options</button>
      </form>
    </main>

    <script src="../shared/shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
